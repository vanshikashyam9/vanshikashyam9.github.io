<!DOCTYPE html>
<html>
  <head>
     <script src="https://aframe.io/releases/1.7.1/aframe.min.js" crossorigin="anonymous"></script>
  </head>

  <body>

    <script>
     document.addEventListener('DOMContentLoaded', () => {
        const isLocal = ['localhost','127.0.0.1','[::1]'].includes(location.hostname);
        const src = isLocal
          ? 'http://localhost:8000/p01/IMAGES/Moving_Forest_1050_700.webp'
          : './IMAGES/Moving_Forest_1050_700.webp';

        const img = document.getElementById('forest');
        img.setAttribute('src', src);

        document.querySelector('a-assets').addEventListener('loaded', () => {
          document.getElementById('mySky')
            .setAttribute('material', 'src: #forest');
        });
      });
    </script>

    <a-scene>
      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

      <a-assets>
        <img id="forest" crossorigin="anonymous">
      </a-assets>

      <a-sky id="mySky"
        src="#forest"
        position="-2.5 0 -1.5">
      </a-sky>

      <!-- TEXT 1 -->
      <a-text
        font="kelsonsans"
        value="Center View "
        width="6"
        position="0 2 -4"
        color="#FFFFFF"
      ></a-text>

      <!-- TEXT 2 -->
      <a-text
        font="kelsonsans"
        value="Right Side"
        width="6"
        position="2 3 -5"
        color="#FFFF00"
      ></a-text>

      <!-- TEXT 3 -->
      <a-text
        font="kelsonsans"
        value="Left Side"
        width="6"
        position="-2 1 -3"
        color="#00FF00"
      ></a-text>

    </a-scene>

  </body>
</html>
