<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> 
  </head>
  <body>
	<!-- <script src="../js/aframe.min.js"></script> -->
	<script>
      document.addEventListener('DOMContentLoaded', () => {
          const isLocal = ['localhost','127.0.0.1','[::1]'].includes(location.hostname);
          const src = isLocal
            ? 'http://localhost:8000/p04/IMAGES/mars-surface.avif'
            : './IMAGES/mars-surface.avif';

          const img = document.getElementById('mars');
          img.setAttribute('src', src);        // set it

          // once assets are ready, use it
          document.querySelector('a-assets').addEventListener('loaded', () => {
            document.getElementById('mySky')
              .setAttribute('material', 'src: #mars');
          });
        });
    </script>
    <a-scene>
		<a-assets>
        	<img id="mars" crossorigin="anonymous">
      	</a-assets>
		<a-sphere src="#mars" radius="0.5" position="0 0.5 -5" segments-height="53"
			animation='property: position; dur: 5000; from: -2 0.5 -5; to: 2 0.5 -5; dir: alternate; easing: linear; loop: true;'
			animation__2='property: rotation; dur: 10000; from: 0 0 0;    to: 0 360 0; dir: normal;    easing: linear; loop: true;'>
		</a-sphere>
		
		<a-entity position="0 0 -5" rotation="0 0 0" 
			animation="property: rotation; to: 0 360 0; loop: true; dur:10000 ">
			<a-sphere position="0 2 -3.5" src="#mars" rotation="0 0 0" ></a-sphere>
		</a-entity>
    </a-scene>
  </body>
</html>
