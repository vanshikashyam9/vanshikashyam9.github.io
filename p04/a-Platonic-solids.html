<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> 
  </head>
  <body>
	
    <a-scene>
      <a-box position="-4.0 1 -5" rotation="0 0 0" color="green" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
      <a-entity position="-2.0 1 -5" geometry="primitive: tetrahedron; radius: 1" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-entity>
      <a-entity position="0 1 -5" geometry="primitive: dodecahedron; radius: 1" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-entity>
      <a-entity position="2.0 1 -5" geometry="primitive: octahedron; radius: 1" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-entity>
      <a-entity position="4.0 1 -5" geometry="primitive: icosahedron" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-entity>
    </a-scene>

  </body>
</html>
