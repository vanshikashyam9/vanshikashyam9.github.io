<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> 
  </head>
  <body>
	<!-- <script src="../js/aframe.min.js"></script> -->
    <a-scene>
	  <a-entity geometry="primitive: box" material="color: blue" position="0 1.5 -5" rotate="45 45 45"
                
             animation__spinX="property: rotation; to: 360 0 0; dur: 5000; easing: linear; loop: true"
             animation__spinY="property: rotation; to: 360 360 0; dur: 5000; easing: linear; loop: true"
			       animation__spinZ="property: rotation; to: 360 360 360; dur: 5000; easing: linear; loop: true"
			 
      
                ></a-entity>
      
	  </a-entity>
    </a-scene>
  </body>
