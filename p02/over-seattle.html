<!DOCTYPE html>
<html>

<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- Sky Image (Using Proxy to fix CORS as instructed in Exercise 3) -->
    <a-sky crossorigin="anonymous" src="https://api.allorigins.win/raw?url=https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Seattle_Skyline_Panorama.jpg/1280px-Seattle_Skyline_Panorama.jpg"></a-sky>

    <!-- REQUIRED TEXT -->
    <a-text value="Seattle Skyline View 🌆" color="#FFFFFF" width="6" position="0 2 -4"></a-text>

    <!-- EXTRA POSITION (for marks) -->
    <a-text value="Right View" color="#FFFF00" width="6" position="2 3 -5"></a-text>

    <a-text value="Left View" color="#00FF00" width="6" position="-2 1 -3"></a-text>

  </a-scene>
</body>

</html>
